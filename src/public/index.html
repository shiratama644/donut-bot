<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DonutSMP Bot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0d0d0d;
    --panel: #141414;
    --border: #2a2a2a;
    --green: #39ff14;
    --yellow: #f0c040;
    --red: #ff4444;
    --dim: #555;
    --text: #d4d4d4;
    --btn: #1e1e1e;
    --btn-active: #2f2f1a;
    --btn-border: #404040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr 280px;
    grid-template-areas:
      "header header"
      "chat   controls"
      "input  controls";
    gap: 1px;
    background-color: var(--border);
  }

  /* ── Header ── */
  header {
    grid-area: header;
    background: var(--panel);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .title {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: var(--yellow);
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  .coords {
    font-size: 13px;
    color: var(--green);
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ── Chat ── */
  #chat {
    grid-area: chat;
    background: var(--panel);
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }

  .msg {
    font-size: 13px;
    line-height: 1.5;
    word-break: break-all;
    animation: fadein 0.15s ease;
  }
  .msg .time { color: var(--dim); font-size: 11px; margin-right: 6px; }
  .msg.sent  .text { color: var(--yellow); }
  .msg.recv  .text { color: var(--text); }
  .msg.sys   .text { color: var(--dim); font-style: italic; }

  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  /* ── Input ── */
  #input-area {
    grid-area: input;
    background: var(--panel);
    display: flex;
    gap: 1px;
  }

  #cmd {
    flex: 1;
    background: var(--btn);
    border: none;
    border-top: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
  }
  #cmd::placeholder { color: var(--dim); }
  #cmd:focus { border-top-color: var(--green); }

  #send {
    background: var(--btn);
    border: none;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    color: var(--green);
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 0 20px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.15s;
  }
  #send:active { background: var(--btn-active); }

  /* ── Controls ── */
  #controls {
    grid-area: controls;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 16px;
    user-select: none;
  }

  .ctrl-label {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  /* D-Pad */
  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 60px);
    grid-template-rows: repeat(3, 60px);
    gap: 4px;
  }

  .btn {
    background: var(--btn);
    border: 1px solid var(--btn-border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active, .btn.active {
    background: var(--btn-active);
    border-color: var(--green);
    color: var(--green);
  }
  .btn.empty { visibility: hidden; }

  /* Bottom row buttons */
  .bottom-btns {
    display: grid;
    grid-template-columns: repeat(3, 60px);
    gap: 4px;
  }

  .btn.jump   { background: #1a1a2a; border-color: #4444aa; }
  .btn.jump:active, .btn.jump.active { background: #22224a; border-color: #6666ff; color: #6666ff; }

  .btn.sneak  { background: #1a1a1a; }
  .btn.sprint { background: #1a1a1a; }

  /* ── Scrollbar ── */
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Mobile layout ── */
  @media (max-width: 600px) {
    body {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto auto;
      grid-template-areas:
        "header"
        "chat"
        "input"
        "controls";
    }
    #controls {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: space-around;
      padding: 12px;
      gap: 12px;
    }
    .ctrl-label { display: none; }
    .dpad { grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(3, 56px); }
    .bottom-btns { grid-template-columns: repeat(3, 56px); }
    .btn { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="title">⛏ DonutSMP</div>
  <div class="coords" id="coords">X: — &nbsp; Y: — &nbsp; Z: —</div>
  <div class="status-dot" id="dot"></div>
</header>

<div id="chat">
  <div class="msg sys"><span class="text">接続待機中…</span></div>
</div>

<div id="input-area">
  <input id="cmd" type="text" placeholder="/say こんにちは" autocomplete="off" enterkeyhint="send">
  <button id="send">SEND</button>
</div>

<div id="controls">
  <div class="ctrl-label">MOVE</div>

  <!-- D-Pad -->
  <div class="dpad">
    <div class="btn empty"></div>
    <div class="btn" data-key="forward">▲</div>
    <div class="btn empty"></div>

    <div class="btn" data-key="left">◄</div>
    <div class="btn empty"></div>
    <div class="btn" data-key="right">►</div>

    <div class="btn" data-key="back">▼</div>
    <div class="btn empty"></div>
    <div class="btn empty"></div>
  </div>

  <!-- Action buttons -->
  <div class="bottom-btns">
    <div class="btn sneak"  data-key="sneak">▿</div>
    <div class="btn jump"   data-key="jump">⬆</div>
    <div class="btn sprint" data-key="sprint">»</div>
  </div>
</div>

<script>
  const chat   = document.getElementById('chat');
  const coords = document.getElementById('coords');
  const dot    = document.getElementById('dot');
  const cmd    = document.getElementById('cmd');
  const send   = document.getElementById('send');

  // ── WebSocket ──
  const WS_URL = `ws://${location.host}`;
  let ws;

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      dot.classList.add('online');
      addMsg('sys', '接続しました');
    };

    ws.onclose = () => {
      dot.classList.remove('online');
      addMsg('sys', '切断されました。再接続中…');
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {};

    ws.onmessage = ({ data }) => {
      const msg = JSON.parse(data);
      if (msg.type === 'pos') {
        coords.textContent =
          `X: ${msg.x.toFixed(1).padStart(8)}   Y: ${msg.y.toFixed(1).padStart(6)}   Z: ${msg.z.toFixed(1).padStart(8)}`;
      }
      if (msg.type === 'chat') {
        addMsg('recv', msg.text, msg.time);
      }
    };
  }

  connect();

  // ── Chat ──
  function addMsg(type, text, time) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    const t = time ? `<span class="time">${time.slice(11, 19)}</span>` : '';
    div.innerHTML = `${t}<span class="text">${escHtml(text)}</span>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    // 最大300件
    while (chat.children.length > 300) chat.removeChild(chat.firstChild);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function sendChat() {
    const text = cmd.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'chat', text }));
    addMsg('sent', text);
    cmd.value = '';
  }

  send.addEventListener('click', sendChat);
  cmd.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });

  // ── Control buttons ──
  function sendKey(key, state) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'key', key, state }));
  }

  document.querySelectorAll('.btn[data-key]').forEach(btn => {
    const key = btn.dataset.key;

    const press   = () => { sendKey(key, true);  btn.classList.add('active'); };
    const release = () => { sendKey(key, false); btn.classList.remove('active'); };

    // タッチ
    btn.addEventListener('touchstart',  (e) => { e.preventDefault(); press(); },   { passive: false });
    btn.addEventListener('touchend',    (e) => { e.preventDefault(); release(); }, { passive: false });
    btn.addEventListener('touchcancel', (e) => { e.preventDefault(); release(); }, { passive: false });

    // マウス（PC用）
    btn.addEventListener('mousedown', press);
    btn.addEventListener('mouseup',   release);
    btn.addEventListener('mouseleave',release);
  });

  // キーボードショートカット（PC）
  const KEY_MAP = { w:'forward', s:'back', a:'left', d:'right', ' ':'jump', Shift:'sneak', r:'sprint' };
  const pressed = new Set();

  document.addEventListener('keydown', (e) => {
    if (e.target === cmd) return;
    const k = KEY_MAP[e.key];
    if (!k || pressed.has(k)) return;
    pressed.add(k);
    sendKey(k, true);
    document.querySelector(`[data-key="${k}"]`)?.classList.add('active');
  });

  document.addEventListener('keyup', (e) => {
    const k = KEY_MAP[e.key];
    if (!k) return;
    pressed.delete(k);
    sendKey(k, false);
    document.querySelector(`[data-key="${k}"]`)?.classList.remove('active');
  });
</script>
</body>
</html>
